name: 发布 v1.4.8
run-name: 发布 v1.4.8（${{ github.sha }}）

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-v1.4.8
  cancel-in-progress: false

env:
  RELEASE_TAG: v1.4.8
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro

jobs:
  build-linux-amd64-package:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'release v1.4.8')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
          cache: false

      - name: 安装打包工具
        run: |
          sudo apt update
          sudo apt install zip -y

      - name: 构建前端 dist
        env:
          VITE_APP_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          cd soybean-admin
          pnpm install --frozen-lockfile
          pnpm build

      - name: 构建 Linux amd64 发布包
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          rm -rf build release-assets
          mkdir -p build release-assets
          go build -C backend -o ../build/rustdesk-api-server-pro .
          cp -R soybean-admin/dist build/dist
          cp backend/server.yaml build/server.yaml
          cp docker/update-openwrt-one-container.sh build/update-openwrt-one-container.sh
          cp docs/OPENWRT_ONE_CONTAINER.md build/OPENWRT_ONE_CONTAINER.md
          cp docs/DOCKER.md build/DOCKER.md
          chmod +x build/rustdesk-api-server-pro build/update-openwrt-one-container.sh
          zip -r release-assets/rustdesk-api-server-pro-${{ env.RELEASE_TAG }}-linux-amd64.zip build

      - name: 上传 Linux amd64 发布包
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: release-assets/*.zip
          if-no-files-found: error

  build-docker:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'release v1.4.8')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ vars.GHCR_USE_PAT == 'true' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,prefix=sha-

      - name: 构建并推送镜像（linux/amd64）
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.RELEASE_TAG }}

  release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'release v1.4.8')
    runs-on: ubuntu-latest
    needs: [build-linux-amd64-package, build-docker]
    steps:
      - name: 下载发布包
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: RustDesk API Server Pro ${{ env.RELEASE_TAG }}（OpenWrt 一体化部署更新）
          generate_release_notes: false
          body: |
            本次发布用于同步 OpenWrt / Docker 一体化部署更新。

            主要内容：
            - 新增 OpenWrt / x86 软路由一键对齐更新脚本：`docker/update-openwrt-one-container.sh`。
            - 新增 `docs/OPENWRT_ONE_CONTAINER.md`，说明一体化部署、反代、第三方登录和回滚流程。
            - 刷新 Docker 文档，明确当前推荐为单容器一体化部署。
            - Docker Compose 示例补充中文 label 与 `ports=12345/tcp` 标记。
            - 修正 raw 配置下载地址为默认分支 `main`。
            - 同步推送 GHCR 镜像标签：`latest`、`${{ env.RELEASE_TAG }}` 和 `sha-*`。

            发布包：
            - `rustdesk-api-server-pro-${{ env.RELEASE_TAG }}-linux-amd64.zip`：Linux amd64 二进制、前端 dist、示例配置和 OpenWrt 对齐脚本。

            升级提示：
            - 当前镜像已内置管理后台前端，不再需要单独 `rustdesk-web` 容器。
            - 从旧部署升级时，建议删除或停用旧 `rustdesk-web`，避免旧 dist 干扰新版登录页。
            - OpenWrt 用户可直接执行文档中的一键脚本，默认数据目录为 `/mnt/docker/rustdesk-api`。
          files: release-assets/*.zip
