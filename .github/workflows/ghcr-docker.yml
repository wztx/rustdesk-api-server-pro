name: 构建并推送 Docker 镜像到 GHCR
run-name: 构建镜像并推送到 GHCR：${{ github.ref_name }}

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 构建并推送（linux/amd64）
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:latest
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:sha-${{ github.sha }}


