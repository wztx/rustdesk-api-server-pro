name: ЙЙНЈВЂЭЦЫЭ Docker ОЕЯёЕН GHCR
run-name: ЙЙНЈОЕЯёВЂЭЦЫЭЕН GHCRЃК${{ github.ref_name }}

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: МьГіДњТы
        uses: actions/checkout@v4

      - name: ХфжУ QEMU
        uses: docker/setup-qemu-action@v3

      - name: ХфжУ Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ЕЧТМ GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: ЙЙНЈВЂЭЦЫЭЃЈlinux/amd64ЃЉ
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:latest
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:sha-${{ github.sha }}

