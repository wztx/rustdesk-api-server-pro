name: 构建 Docker 镜像
run-name: 构建 Docker 镜像：${{ github.ref_name }}

on:
  push:
    branches: ["master", "main"]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_image:
        description: "推送镜像到 GHCR（需要 Package 写入权限）"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  PUSH_IMAGE: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true') }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 提取镜像版本
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "app_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: 登录 GHCR
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ vars.GHCR_USE_PAT == 'true' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ env.PUSH_IMAGE == 'true' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建镜像（linux/amd64）
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUSH_IMAGE == 'true' }}
          load: ${{ env.PUSH_IMAGE != 'true' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}


