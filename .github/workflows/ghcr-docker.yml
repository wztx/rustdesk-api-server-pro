name: นนฝจฒขอฦหอ Docker พตฯ๑ตฝ GHCR
run-name: นนฝจพตฯ๑ฒขอฦหอตฝ GHCRฃบ${{ github.ref_name }}

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: ผ์ณ๖ด๚ย๋
        uses: actions/checkout@v4

      - name: ลไึร QEMU
        uses: docker/setup-qemu-action@v3

      - name: ลไึร Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ตวยผ GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: นนฝจฒขอฦหอฃจlinux/amd64ฃฉ
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:latest
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:sha-${{ github.sha }}
