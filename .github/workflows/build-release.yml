name: 构建并发布版本
run-name: 发布构建（${{ github.ref_name || github.sha }}）

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
          cache: false

      - name: 提取标签
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt install make zip -y
          cd soybean-admin && pnpm install --frozen-lockfile
      
      - name: 编译项目
        env:
          VITE_APP_VERSION: ${{ steps.tag.outputs.tag_name || github.ref_name }}
        run: |
          go env -w GOOS=${{matrix.os}}
          go env -w GOARCH=${{matrix.arch}}
          go build -C backend -o ../build/
          cd soybean-admin && pnpm build 
          cd .. && cp -R soybean-admin/dist build/
          cp backend/server.yaml build/
          cp LICENSE build/
          cp NOTICE build/
          cp THIRD_PARTY_NOTICES.md build/
          cp DISCLAIMER.md build/
          cp SECURITY.md build/
          cp PRIVACY.md build/
          cp COMPLIANCE.md build/
          cp CONTRIBUTING.md build/
          cp CODE_OF_CONDUCT.md build/
          cp SUPPORT.md build/
          mkdir -p build/docs
          cp docs/LEGAL_COMPLIANCE.md build/docs/LEGAL_COMPLIANCE.md
          cp docs/DOCKER.md build/docs/DOCKER.md
          cp docs/OPENWRT_ONE_CONTAINER.md build/docs/OPENWRT_ONE_CONTAINER.md

      - name: 打包文件
        run: |
          zip -r ${{matrix.os}}-${{matrix.arch}}.zip build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{matrix.os}}-${{matrix.arch}}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: RustDesk API Server Pro（${{ needs.build.outputs.tag_name }}）
          generate_release_notes: false
          body: |
            本次发布重新生成 RustDesk API Server Pro 部署包。

            主要内容：
            - 生成 Linux、Windows、macOS 的 amd64 和 arm64 部署包。
            - 部署包包含后端二进制、管理后台 dist、示例配置、Docker/OpenWrt 文档以及许可证/合规声明文件。
            - Docker 镜像发布工作流会在 tag 发布时同步推送 GHCR `latest`、版本标签和 sha 标签。
            - 本项目是独立兼容实现，不是 RustDesk、Huawei、HarmonyOS、OpenHarmony 或其他第三方厂商的官方项目。

            合规提示：
            - 本项目使用 AGPL-3.0。若修改后通过网络向用户提供服务，应按 AGPL-3.0 提供对应源码。
            - 发布包中不应包含生产数据库、生产 server.yaml、OAuth 密钥、SMTP 密码、日志、录屏文件或其他敏感数据。
            - 第三方组件、商标、隐私、安全和发布合规说明见仓库中的 `NOTICE`、`THIRD_PARTY_NOTICES.md`、`DISCLAIMER.md`、`SECURITY.md`、`PRIVACY.md`、`COMPLIANCE.md`。

            升级提示：
            - 请同时替换后端程序和管理后台 dist 静态资源，并重启服务。
            - Docker 镜像启动脚本会自动执行数据库同步；二进制部署请手动执行 `sync`。
            - 浏览器仍显示旧更新日志或旧按钮时，请强制刷新页面或清理缓存后再确认。
          files: release-assets/*.zip
