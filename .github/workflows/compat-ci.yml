name: 兼容性检查
run-name: 兼容性检查（${{ github.ref_name }}）

on:
  push:
    branches: ["master", "main", "develop"]
    paths:
      - 'backend/**'
      - 'soybean-admin/**'
      - 'docker/**'
      - 'Dockerfile'
      - 'scripts/compat/**'
      - 'docs/compat/**'
      - '.github/workflows/compat-ci.yml'
  pull_request:
    branches: ["master", "main", "develop"]
    paths:
      - 'backend/**'
      - 'soybean-admin/**'
      - 'docker/**'
      - 'Dockerfile'
      - 'scripts/compat/**'
      - 'docs/compat/**'
      - '.github/workflows/compat-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-compat:
    name: 后端兼容性检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.4'
          cache-dependency-path: backend/go.sum

      - name: 后端测试
        run: go test ./...

      - name: 后端构建
        run: go build -o rustdesk-api-server-pro .

  scripts-compat:
    name: 兼容脚本检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 Shell 脚本语法
        run: |
          bash -n scripts/compat/check-rustdesk-release.sh
          bash -n scripts/compat/update-compat-target.sh
          bash -n scripts/compat/smoke-api.sh
          bash -n scripts/compat/extract-api-hints.sh
          bash -n scripts/compat/verify-compat-target.sh

      - name: 校验兼容性清单
        run: jq -e '.client.version and .sysinfo_version and .validated_endpoints' docs/compat/rustdesk-current.json

      - name: 校验清单和 Go 常量
        run: bash scripts/compat/verify-compat-target.sh

  docker-smoke:
    name: Docker 冒烟测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: docker build --build-arg APP_VERSION=compat-ci -t rustdesk-api-server-pro:compat-ci .

      - name: 准备 CI 安全配置
        run: |
          cp backend/server.yaml compat-ci-server.yaml
          sed -i 's/^signKey:.*/signKey: "compat-ci-random-sign-key-1234567890abcdef"/' compat-ci-server.yaml

      - name: 启动 Docker 容器
        run: |
          docker run -d \
            --name rustdesk-api-compat-ci \
            --network host \
            -e ADMIN_USER=admin \
            -e ADMIN_PASS=ChangeMe123! \
            -v "$PWD/compat-ci-server.yaml:/app/server.yaml:ro" \
            rustdesk-api-server-pro:compat-ci

      - name: 等待 API 就绪
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:12345/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs rustdesk-api-compat-ci || true
          exit 1

      - name: 执行公开接口冒烟测试
        run: bash scripts/compat/smoke-api.sh http://127.0.0.1:12345

      - name: 失败时显示容器日志
        if: failure()
        run: docker logs rustdesk-api-compat-ci || true
