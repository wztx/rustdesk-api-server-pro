name: RustDesk 上游新版本检查

on:
  push:
    branches: ["master", "main", "develop"]
  pull_request:
    branches: ["master", "main", "develop"]
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-rustdesk-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest RustDesk release
        id: check
        run: |
          bash scripts/compat/check-rustdesk-release.sh \
            docs/compat/rustdesk-current.json \
            docs/compat/rustdesk-latest-detected.json

      - name: Auto-update compatibility target files
        if: steps.check.outputs.needs_update == 'true'
        run: |
          bash scripts/compat/update-compat-target.sh \
            docs/compat/rustdesk-latest-detected.json \
            docs/compat/rustdesk-current.json \
            backend/internal/service/compat_service.go

      - name: Generate upstream API hint report
        if: steps.check.outputs.needs_update == 'true'
        run: |
          bash scripts/compat/extract-api-hints.sh \
            "${{ steps.check.outputs.latest_tag }}" \
            docs/compat/reports

      - name: Build compatibility report
        if: steps.check.outputs.needs_update == 'true'
        run: |
          mkdir -p docs/compat/reports
          cat > docs/compat/reports/rustdesk-${{ steps.check.outputs.latest_tag }}.md <<'MD'
          # RustDesk compatibility update detected

          A new upstream RustDesk release was detected and the compatibility target files were updated automatically.

          - Current target before update: `${{ steps.check.outputs.current_version }}`
          - Latest upstream: `${{ steps.check.outputs.latest_tag }}`

          Generated reports:

          - `docs/compat/reports/api-hints-${{ steps.check.outputs.latest_tag }}.md`

          Suggested review checklist:

          - [ ] Review upstream release changelog.
          - [ ] Compare generated API hints with `docs/API_MATRIX.md`.
          - [ ] Run Docker image build.
          - [ ] Run `bash scripts/compat/smoke-api.sh http://127.0.0.1:12345`.
          - [ ] Run login/currentUser/logout smoke tests with `TOKEN` if available.
          - [ ] Run address book smoke tests.
          - [ ] Run audit/record smoke tests.
          - [ ] Confirm whether any new upstream API behavior needs real code changes beyond version target update.
          MD

      - name: Create compatibility PR
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: align RustDesk ${{ steps.check.outputs.latest_tag }} compatibility target"
          body: |
            RustDesk upstream published a new release.

            - Current target before update: `${{ steps.check.outputs.current_version }}`
            - Latest upstream: `${{ steps.check.outputs.latest_tag }}`

            This PR was generated automatically. It updates the compatibility target constants and manifest, then creates checklist and upstream API hint reports. It does not claim full behavioral compatibility by itself; run Docker/Go build and smoke tests before merging.
          branch: "bot/rustdesk-${{ steps.check.outputs.latest_tag }}-compat"
          commit-message: "chore: align RustDesk ${{ steps.check.outputs.latest_tag }} compatibility target"
